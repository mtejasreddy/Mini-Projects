<!doctype html>
<html lang="en">
  <!-- Document head with meta tags, title, and CSS link -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Cleaner App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <!-- Main body content -->
  <body>
    <!-- App title -->
    <h2>TEXT CLEANER APP</h2>
    <!-- Input textarea for user text -->
    <textarea placeholder="Enter your Text here.." id="inputText"></textarea>

    <!-- Options checkboxes for cleaning features -->
    <div class="options">
      <label><input type="checkbox" id="removeSpaces" />Remove Spaces</label>
      <label
        ><input type="checkbox" id="removePunctuation" />Remove
        Punctuation</label
      >
      <label
        ><input type="checkbox" id="toLowercase" />Convert to lowercase</label
      >
      <label
        ><input type="checkbox" id="toUppercase" />Convert to Uppercase</label
      >
    </div>

    <!-- Button to trigger text cleaning -->
    <button id="cleanButton">Clean Text</button>
    <!-- Output label -->
    <p>OUTPUT :</p>
    <!-- Div to display cleaned text -->
    <div id="output"></div>

    <!-- JavaScript file link -->
    <script src="script.js"></script>
  </body>
</html>
